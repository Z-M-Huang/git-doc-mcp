schemaVersion: "1.0"
name: git-doc-mcp-docs
version: 1.0.0
description: |
  Documentation assistant for git-doc-mcp.
  Browse guides, search documentation, and get examples for creating
  your own MCP servers with git-doc-mcp manifests.

instructions: |
  You are a documentation assistant for git-doc-mcp, a declarative MCP manifest system.
  You MUST use the tools below to answer questions — do NOT rely on prior knowledge.

  MANDATORY RULES:
  - ALWAYS use at least one tool BEFORE answering any question about git-doc-mcp.
  - NEVER answer from memory alone — the documentation is the source of truth.
  - Use the decision tree below to pick the right tool for each situation.

  DECISION TREE — match the user's intent to a tool:

  User wants to explore / "what docs exist?"
    → call list_topics

  User asks a specific question / has a keyword / error message
    → call search_docs with relevant keywords

  User asks about a known topic (and you know the slug)
    → call get_guide with the topic slug

  User says "show me an example" / wants working code
    → call get_example (github-repo-tools, documentation-server,
      rest-api-wrapper, multi-source-aggregator, static-knowledge-base)

  User is writing an action script / asks about ctx.fetch / ctx.getSecret / ctx.log
    → call get_action_api

  User wants to create a manifest from scratch
    → FIRST get_guide("Manifest-Reference"), THEN get_guide("Writing-Actions"),
      THEN get_example for a similar use case

  User is troubleshooting
    → FIRST get_guide("Troubleshooting"), THEN search_docs with the error text

  If unsure which tool to use → call search_docs (safest default).

secrets:
  - name: GITHUB_TOKEN
    description: "GitHub token for accessing wiki content (optional, for private wikis or higher rate limits)"
    scope:
      - "https://raw.githubusercontent.com/*"
    required: false

tools:
  - name: list_topics
    title: List Documentation Topics
    description: |
      List all available documentation topics for git-doc-mcp.
      Optionally filter by tag to find specific categories.
      Available tags: quickstart, reference, actions, tools, resources, prompts,
      secrets, security, cli, best-practices, examples, troubleshooting.

      USE THIS WHEN:
      - The user asks "what documentation is available?" or "what topics do you cover?"
      - The user wants to browse or explore without a specific question
      - You need to discover the correct slug before calling get_guide
      - The conversation is just starting and the user hasn't stated a specific need

      DO NOT USE WHEN:
      - The user has a specific question (use search_docs instead)
      - You already know the exact topic slug (use get_guide directly)

      Example: "What can you help me with?" / "Show me what's available" / "List the docs"
    inputSchema:
      type: object
      properties:
        tag:
          type: string
          description: "Filter topics by tag (e.g., 'reference', 'quickstart', 'security', 'examples')"
    action: https://raw.githubusercontent.com/Z-M-Huang/git-doc-mcp/main/.mcp/actions/list-topics.v1.js
    actionHash: "sha256:888a4a2148c8e428b93da0ea09881fbe19a55de37f723d7184613d333afdfe3d"
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true

  - name: get_guide
    title: Get Documentation Guide
    description: |
      Fetch a specific documentation guide by topic slug.
      Returns the full markdown content of the guide.
      Common slugs: Getting-Started, Manifest-Reference, Writing-Actions,
      Defining-Tools, Managing-Secrets, CLI-Reference, Best-Practices, Examples.

      USE THIS WHEN:
      - You know which guide the user needs (e.g., they said "manifest reference")
      - Following up after list_topics returned a relevant slug
      - The user asks about a broad topic that maps to one guide
      - Building a multi-step answer (fetch Manifest-Reference, then Writing-Actions)

      DO NOT USE WHEN:
      - You don't know the right slug (use search_docs to find it first)
      - The user's question spans multiple topics (use search_docs instead)

      Example: "Show me the getting started guide" / "How do I define tools?" / "What's the manifest schema?"
    inputSchema:
      type: object
      properties:
        topic:
          type: string
          description: "Topic slug (e.g., 'Getting-Started', 'Manifest-Reference', 'Writing-Actions')"
      required: [topic]
    action: https://raw.githubusercontent.com/Z-M-Huang/git-doc-mcp/main/.mcp/actions/get-guide.v1.js
    actionHash: "sha256:55ac2acb632f5f47ac7189a03b97e8362631363024cdb43594d520184dfefbc5"
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true

  - name: search_docs
    title: Search Documentation
    description: |
      Search across all git-doc-mcp documentation by keyword.
      Finds matching topics by searching titles, descriptions, and tags,
      then fetches and returns the full content of matching pages.
      This is the DEFAULT tool — use it when you are unsure which tool to call.

      USE THIS WHEN:
      - The user asks any specific question about git-doc-mcp
      - The user mentions an error message or unexpected behavior
      - You are unsure which guide contains the answer
      - The user uses technical terms like "SSRF", "input schema", "scope pattern"

      DO NOT USE WHEN:
      - You already know the exact guide slug (use get_guide — it's faster)
      - The user just wants to browse topics (use list_topics)
      - The user explicitly asks for a working example (use get_example)

      Example: "How do I protect against SSRF?" / "What is secret scoping?" / "Why is my action timing out?"
    inputSchema:
      type: object
      properties:
        query:
          type: string
          description: "Search keyword(s) (e.g., 'secret scope', 'input schema', 'SSRF')"
        max_results:
          type: number
          description: "Maximum number of results to return (default: 3, max: 5)"
      required: [query]
    action: https://raw.githubusercontent.com/Z-M-Huang/git-doc-mcp/main/.mcp/actions/search-docs.v1.js
    actionHash: "sha256:eddbaa1b1ccf6739f63b823aa7c8a45291185cae08a11e5681626bffe763a18f"
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: false
      openWorldHint: true

  - name: get_example
    title: Get Example
    description: |
      Fetch a specific complete working example from the Examples page.
      Each example includes a full manifest and action scripts you can copy and adapt.
      Available examples: github-repo-tools, documentation-server,
      rest-api-wrapper, multi-source-aggregator, static-knowledge-base.

      USE THIS WHEN:
      - The user says "show me an example" or "how do I build a ___?"
      - The user wants a complete, working manifest + action scripts to copy
      - After explaining concepts, to reinforce with a concrete example

      DO NOT USE WHEN:
      - The user asks about a concept or config detail (use get_guide or search_docs)
      - The user needs the ctx API reference (use get_action_api)

      Example: "Show me a GitHub tools example" / "I want to wrap a REST API" / "Give me a template"
    inputSchema:
      type: object
      properties:
        name:
          type: string
          description: "Example name (e.g., 'github-repo-tools', 'documentation-server', 'rest-api-wrapper')"
      required: [name]
    action: https://raw.githubusercontent.com/Z-M-Huang/git-doc-mcp/main/.mcp/actions/get-example.v1.js
    actionHash: "sha256:8251d7a90e383b9e708c2125bc68a25afb0dc82ee88b14a213291321636f5e28"
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true

  - name: get_action_api
    title: Get Action API Reference
    description: |
      Fetch the action scripting API reference (ctx object documentation).
      Optionally get a specific section by matching level-2 headings.
      Available sections: ctx.fetch, ctx.getSecret, ctx.log, ctx.manifest,
      Return Format, Sandbox Constraints, Patterns, Versioning Actions.

      USE THIS WHEN:
      - The user is writing or debugging an action script
      - The user asks about ctx.fetch, ctx.getSecret, ctx.log, or ctx.manifest
      - The user asks about sandbox constraints, return format, or action patterns
      - You need to verify the exact API signature before generating action code

      DO NOT USE WHEN:
      - The user asks about manifest YAML structure (use get_guide with "Manifest-Reference")
      - The user wants a complete working example (use get_example)

      Example: "How does ctx.fetch work?" / "What can I do in a sandbox?" / "How do I return data from an action?"
    inputSchema:
      type: object
      properties:
        section:
          type: string
          description: "Specific section to fetch (e.g., 'ctx.fetch', 'ctx.getSecret', 'Return Format', 'Patterns'). Omit for full reference."
    action: https://raw.githubusercontent.com/Z-M-Huang/git-doc-mcp/main/.mcp/actions/get-action-api.v1.js
    actionHash: "sha256:e25e2b63edd5a9523334b318f955c43c4ea66c749ac576031ae90d292eed4a96"
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true

resources:
  - name: getting-started
    uri: https://raw.githubusercontent.com/wiki/Z-M-Huang/git-doc-mcp/Getting-Started.md
    description: Quick start guide — create your first MCP server in 5 minutes
    mimeType: text/markdown

  - name: manifest-reference
    uri: https://raw.githubusercontent.com/wiki/Z-M-Huang/git-doc-mcp/Manifest-Reference.md
    description: Complete manifest.yml schema reference with all fields and options
    mimeType: text/markdown

  - name: project-readme
    uri: https://raw.githubusercontent.com/Z-M-Huang/git-doc-mcp/main/README.md
    description: Project README with overview and quick setup
    mimeType: text/markdown

prompts:
  - name: create-manifest
    title: Create a Manifest
    description: Guided workflow for creating a new git-doc-mcp manifest from scratch
    args:
      - name: project_name
        description: Name for the MCP server (e.g., "my-api-tools")
        required: true
      - name: description
        description: What the MCP server will do
        required: false
    messages:
      - role: user
        content:
          type: resource
          resource:
            uri: https://raw.githubusercontent.com/wiki/Z-M-Huang/git-doc-mcp/Manifest-Reference.md
            mimeType: text/markdown
      - role: user
        content:
          type: text
          text: |
            Based on the manifest reference above, help me create a new git-doc-mcp manifest.

            Project name: {{project_name}}
            Description: {{description}}

            Walk me through:
            1. The basic manifest structure (schemaVersion, name, version)
            2. Defining my tools with appropriate input schemas
            3. Adding secrets if my tools need API authentication
            4. Setting up resources and prompts if useful
            5. Writing the action scripts for each tool

            Generate the complete manifest.yml and action scripts.

  - name: create-action
    title: Create an Action Script
    description: Guided workflow for writing a new action script
    args:
      - name: tool_name
        description: Name of the tool this action implements
        required: true
      - name: api_base_url
        description: Base URL of the API the action will call (if any)
        required: false
    messages:
      - role: user
        content:
          type: resource
          resource:
            uri: https://raw.githubusercontent.com/wiki/Z-M-Huang/git-doc-mcp/Writing-Actions.md
            mimeType: text/markdown
      - role: user
        content:
          type: text
          text: |
            Based on the action scripting reference above, help me write an action script.

            Tool name: {{tool_name}}
            API base URL: {{api_base_url}}

            Generate a complete action script that:
            1. Exports a default async function
            2. Uses ctx.fetch for HTTP requests with proper error handling
            3. Uses ctx.getSecret for authentication (if API URL provided)
            4. Uses ctx.log for meaningful logging
            5. Returns properly formatted content
            6. Handles all error cases gracefully

  - name: welcome
    title: Welcome - Get Started
    description: Introduction to git-doc-mcp documentation assistant and available tools
    messages:
      - role: user
        content:
          type: text
          text: |
            I'm exploring git-doc-mcp. Give me a brief overview of what you can help with
            and what tools are available, then ask what I'd like to do.
      - role: assistant
        content:
          type: text
          text: |
            I'm your git-doc-mcp documentation assistant. Here's what I can do:

            **Browse documentation** — list all available topics and fetch full guides.
            **Search** — search across all docs by keyword to find answers quickly.
            **Show examples** — complete, working examples you can copy and adapt:
              github-repo-tools, documentation-server, rest-api-wrapper,
              multi-source-aggregator, static-knowledge-base.
            **API reference** — action scripting API (ctx.fetch, ctx.getSecret, ctx.log).
            **Create from scratch** — guided manifest and action script creation.

            What would you like to do? For example:
            - "Show me how to get started"
            - "I want to build a manifest that wraps a REST API"
            - "How do secrets and scoping work?"
            - "Show me the rest-api-wrapper example"
